<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Body Condition Score Katzen 1 bis 9</title>
  <desc id="desc">Vereinfachte, selbst erstellte und frei nutzbare Grafik zur BCS-Einschaetzung bei Katzen.</desc>

  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .score { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .note { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .small { font: 500 11px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>

    <g id="cat">
      <ellipse cx="0" cy="0" rx="33" ry="20" fill="currentColor"/>
      <circle cx="31" cy="-7" r="11" fill="currentColor"/>
      <polygon points="36,-17 32,-29 42,-19" fill="currentColor"/>
      <polygon points="23,-16 19,-28 29,-19" fill="currentColor"/>
      <rect x="-24" y="15" width="7" height="18" rx="3" fill="currentColor"/>
      <rect x="-5" y="15" width="7" height="18" rx="3" fill="currentColor"/>
      <rect x="12" y="15" width="7" height="18" rx="3" fill="currentColor"/>
      <rect x="28" y="15" width="7" height="18" rx="3" fill="currentColor"/>
      <path d="M-35 -2 Q-52 -10 -62 -2" stroke="currentColor" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)" rx="18"/>

  <text x="40" y="56" class="title">Body Condition Score (BCS) fuer Katzen: 1 bis 9</text>
  <text x="40" y="84" class="sub">Selbsterstellte, lizenzfreie Orientierungsgrafik (keine tiermedizinische Diagnose)</text>

  <g transform="translate(45,120)">
    <rect x="0" y="0" width="121" height="180" rx="12" fill="#fee2e2" stroke="#fecaca"/>
    <text x="14" y="28" class="score">BCS 1</text>
    <g transform="translate(58,92) scale(0.74,0.72)" style="color:#b91c1c"><use href="#cat"/></g>
    <text x="12" y="154" class="note">sehr duenn</text>
  </g>

  <g transform="translate(172,120)">
    <rect x="0" y="0" width="121" height="180" rx="12" fill="#fee2e2" stroke="#fecaca"/>
    <text x="14" y="28" class="score">BCS 2</text>
    <g transform="translate(58,92) scale(0.8,0.77)" style="color:#be123c"><use href="#cat"/></g>
    <text x="14" y="154" class="note">duenn</text>
  </g>

  <g transform="translate(299,120)">
    <rect x="0" y="0" width="121" height="180" rx="12" fill="#fef3c7" stroke="#fde68a"/>
    <text x="14" y="28" class="score">BCS 3</text>
    <g transform="translate(58,92) scale(0.86,0.84)" style="color:#c2410c"><use href="#cat"/></g>
    <text x="14" y="154" class="note">eher schlank</text>
  </g>

  <g transform="translate(426,120)">
    <rect x="0" y="0" width="121" height="180" rx="12" fill="#fef9c3" stroke="#fde047"/>
    <text x="14" y="28" class="score">BCS 4</text>
    <g transform="translate(58,92) scale(0.93,0.90)" style="color:#a16207"><use href="#cat"/></g>
    <text x="14" y="154" class="note">leicht schlank</text>
  </g>

  <g transform="translate(553,120)">
    <rect x="0" y="0" width="121" height="180" rx="12" fill="#dcfce7" stroke="#86efac"/>
    <text x="14" y="28" class="score">BCS 5</text>
    <g transform="translate(58,92) scale(1.0,1.0)" style="color:#166534"><use href="#cat"/></g>
    <text x="14" y="154" class="note">ideal</text>
  </g>

  <g transform="translate(680,120)">
    <rect x="0" y="0" width="121" height="180" rx="12" fill="#ecfccb" stroke="#bef264"/>
    <text x="14" y="28" class="score">BCS 6</text>
    <g transform="translate(58,92) scale(1.06,1.04)" style="color:#4d7c0f"><use href="#cat"/></g>
    <text x="14" y="154" class="note">leicht ueber</text>
  </g>

  <g transform="translate(807,120)">
    <rect x="0" y="0" width="121" height="180" rx="12" fill="#fde68a" stroke="#fcd34d"/>
    <text x="14" y="28" class="score">BCS 7</text>
    <g transform="translate(58,92) scale(1.14,1.10)" style="color:#92400e"><use href="#cat"/></g>
    <text x="14" y="154" class="note">uebergewichtig</text>
  </g>

  <g transform="translate(934,120)">
    <rect x="0" y="0" width="121" height="180" rx="12" fill="#fed7aa" stroke="#fdba74"/>
    <text x="14" y="28" class="score">BCS 8</text>
    <g transform="translate(58,92) scale(1.22,1.16)" style="color:#9a3412"><use href="#cat"/></g>
    <text x="14" y="154" class="note">stark ueber</text>
  </g>

  <g transform="translate(1061,120)">
    <rect x="0" y="0" width="121" height="180" rx="12" fill="#fecaca" stroke="#fca5a5"/>
    <text x="14" y="28" class="score">BCS 9</text>
    <g transform="translate(58,92) scale(1.30,1.22)" style="color:#991b1b"><use href="#cat"/></g>
    <text x="14" y="154" class="note">adipoes</text>
  </g>

  <text x="40" y="336" class="small">BCS 4-5 gilt bei den meisten erwachsenen Katzen als Zielbereich. Die Darstellung ist bewusst vereinfacht.</text>
  <text x="40" y="356" class="small">Copyright: Cat Slim Down Projektteam - frei nutzbar innerhalb dieses Projekts.</text>
</svg>
